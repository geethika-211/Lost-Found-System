<!DOCTYPE html>
<html>
<head>
  <title>Lost & Found System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Lost & Found System</h1>

<div class="form">
  <input id="item" placeholder="Item Name">
  
  <select id="type">
    <option value="Lost">Lost</option>
    <option value="Found">Found</option>
  </select>

  <input type="date" id="date">
  <input type="file" id="image">

  <button onclick="addItem()">Post</button>
</div>

<input id="search" placeholder="Search item..." onkeyup="searchItems()">

<div class="filter">
  <button onclick="filterItems('All')">All</button>
  <button onclick="filterItems('Lost')">Lost</button>
  <button onclick="filterItems('Found')">Found</button>
</div>

<div id="items" class="container"></div>

<script src="script.js"></script>
</body>
</html>
